# ── WanderNest — Frontend (Railway Service: root dir = client/) ──
# Railpack/Nixpacks picks this up when root directory is set to "client"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[staticDir]
path = "dist"

[start]
cmd = "caddy run --config /app/Caddyfile"
